server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:transactionsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# account-service.url removed — Eureka handles discovery now ✅

eureka:
  instance:
    prefer-ip-address: true